; =============================================================
; PlatformIO Configuration — IOT Forest Cam (CS Group 2)
; Target: LilyGo T3-S3 V1.2 (Arduino Framework)
;
; Three environments:
;   esp32s3         — Leaf node  (WiFi AP + CoAP Server + LoRa Beacon TX)
;   esp32s3_gateway — Gateway    (LoRa Beacon RX + WiFi STA + CoAP Client)
;   esp32s3_relay   — Relay node (Leaf + LoRa Beacon Relay)
;
; Build:
;   pio run -e esp32s3
;   pio run -e esp32s3_gateway
;   pio run -e esp32s3_relay
; =============================================================

; --- Shared Configuration ---
[env]
platform = espressif32
board = esp32-s3-devkitc-1           ; Generic S3 (T3-S3 V1.2 not in registry)
framework = arduino

board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.flash_mode = dio
board_build.psram_type = opi

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    jgromes/RadioLib@^6.6.0

board_build.partitions = default.csv

; =============================================================
; Leaf Node — WiFi AP + CoAP Server + LoRa Beacon TX
; =============================================================
[env:esp32s3]
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3           ; Info
    -DVSENSOR_SD_CLK=14
    -DVSENSOR_SD_MISO=2
    -DVSENSOR_SD_MOSI=11
    -DVSENSOR_SD_CS=13
upload_port = COM3

; =============================================================
; Gateway Node — LoRa Beacon RX + WiFi STA + CoAP Client
; =============================================================
[env:esp32s3_gateway]
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=4           ; Debug (more verbose for development)
    -DGATEWAY_MODE=1
    -DVSENSOR_SD_CLK=14
    -DVSENSOR_SD_MISO=2
    -DVSENSOR_SD_MOSI=11
    -DVSENSOR_SD_CS=13
upload_port = COM9

; =============================================================
; Relay Node — Leaf + LoRa Beacon Relay
; =============================================================
[env:esp32s3_relay]
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3           ; Info
    -DRELAY_MODE=1
    -DVSENSOR_SD_CLK=14
    -DVSENSOR_SD_MISO=2
    -DVSENSOR_SD_MOSI=11
    -DVSENSOR_SD_CS=13
; upload_port = COM??             ; Set to relay board's COM port when plugged in
