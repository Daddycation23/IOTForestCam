; =============================================================
; PlatformIO Configuration — IOT Forest Cam (CS Group 19)
; Target: LilyGo T-Beam S3 Supreme (Arduino Framework)
;
; Two environments:
;   esp32s3         — Leaf node (WiFi AP + CoAP Server)
;   esp32s3_gateway — Gateway node (WiFi STA + CoAP Client)
;
; Build leaf:    pio run -e esp32s3
; Build gateway: pio run -e esp32s3_gateway
; =============================================================

; --- Shared Configuration ---
[env]
platform = espressif32
board = esp32-s3-devkitc-1           ; Generic S3 (T-Beam S3 Supreme not in registry)
framework = arduino

board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.flash_mode = dio
board_build.psram_type = opi

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    ; RadioLib for LoRa (Part 2 – commented until needed)
    ; jgromes/RadioLib@^6.6.0

board_build.partitions = default.csv

; =============================================================
; Leaf Node — WiFi AP + CoAP Server (serves images from SD)
; =============================================================
[env:esp32s3]
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3           ; Info
    -DVSENSOR_SD_CLK=14
    -DVSENSOR_SD_MISO=2
    -DVSENSOR_SD_MOSI=11
    -DVSENSOR_SD_CS=13
upload_port = COM3

; =============================================================
; Gateway Node — WiFi STA + CoAP Client (downloads images)
; =============================================================
[env:esp32s3_gateway]
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=4           ; Debug (more verbose for development)
    -DGATEWAY_MODE=1
    -DVSENSOR_SD_CLK=14
    -DVSENSOR_SD_MISO=2
    -DVSENSOR_SD_MOSI=11
    -DVSENSOR_SD_CS=13
upload_port = COM9
